<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="PromptAmp">
  <!--
    Wand + sparkle: a magic wand with an amber spark at its tip and a small
    twinkle trailing it — "transform this text". An emerald disc (the brand
    colour, matching the in-page floating button) so button and brand read as
    one system; amber stays the "amplify" accent. Reads down to 16px.
    Regenerate the PNG set with `pnpm icons` after editing this file; the
    in-page button carries a monochrome version of the same mark.
  -->
  <rect x="4" y="4" width="92" height="92" rx="24" fill="#047857"/>
  <path d="M25 76 L57 44" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <path d="M68 17 Q68 30 81 30 Q68 30 68 43 Q68 30 55 30 Q68 30 68 17 Z" fill="#FBBF24"/>
  <path d="M30 27 v11 M24.5 32.5 h11" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round"/>
</svg>
